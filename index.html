<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="app-shell">
      <header id="app-header">
        <p>Habit Tracker</p>
        <h1 id="page-title">Daily Habit Tracker</h1>
        <p id="app-description">
          Track a few daily habits and see what you have completed today.
        </p>
      </header>

      <main id="main-content">
        <section id="habit-section" aria-labelledby="habit-list-title">
          <div id="habit-list-header">
            <h2 id="habit-list-title">Today&apos;s habits</h2>
            <p>Mark each habit complete as you work through today&apos;s routine.</p>
          </div>
          <form id="habit-form" aria-labelledby="habit-form-title">
            <h3 id="habit-form-title">Add a daily task</h3>
            <div id="habit-form-controls">
              <label id="habit-name-label" for="habit-name-input">Task name</label>
              <input
                id="habit-name-input"
                name="habitName"
                type="text"
                maxlength="60"
                placeholder="Example: Journal for 5 minutes"
                required
              />
              <button id="habit-submit-button" type="submit">Add task</button>
            </div>
          </form>
          <div id="habit-list-region" aria-live="polite">
            <ul id="habit-list"></ul>
          </div>
        </section>

        <section
          id="completion-history-section"
          aria-labelledby="completion-history-title"
        >
          <div id="completion-history-header">
            <h2 id="completion-history-title">Completion history</h2>
            <p>See how many habits you finished on each tracked day.</p>
          </div>
          <div id="completion-history-region" aria-live="polite">
            <ul id="completion-history-graph"></ul>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
